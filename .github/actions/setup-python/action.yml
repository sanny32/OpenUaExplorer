name: Set up Python
description: >-
  Builds a Python newer than the one the build container ships and puts it first
  on PATH. The packages are built in an old container to keep the glibc the
  binaries reference low, and its Python is too old for aqtinstall, which
  install-qt-action runs out of PATH. The container's release is old enough that
  no repository offers a newer one either, so it is built from source.

inputs:
  version:
    description: 'The Python that is built; the full version, as released'
    required: false
    default: '3.12.13'
  prefix:
    description: 'Where the interpreter is installed, and prepended to PATH'
    required: false
    default: /opt/python

runs:
  using: composite
  steps:
    # The build takes minutes and its result depends only on the source and on
    # the container it is built in, so the whole prefix is restored from a cache
    # instead. The key is pinned to the container: the interpreter links against
    # its libraries and cannot be reused across images.
    - name: Cache Python
      id: cache
      uses: actions/cache@v5
      with:
        path: ${{ inputs.prefix }}
        key: python-${{ env.OPENSSL_CACHE_PLATFORM || env.ImageOS }}-${{ runner.arch }}-${{ inputs.version }}

    # The system interpreter is left in place rather than replaced: apt on these
    # releases is built against it.
    #
    # The -dev packages are what the modules the build tools need are compiled
    # against: ssl for pip to reach PyPI at all, and lzma and bz2 for the archives
    # aqtinstall unpacks. Their absence is not an error - the module is silently
    # skipped - so the build is checked below instead.
    - name: Build Python ${{ inputs.version }}
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        PREFIX: ${{ inputs.prefix }}
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential ca-certificates curl \
          libbz2-dev libffi-dev liblzma-dev libssl-dev zlib1g-dev

        src="$(mktemp -d)"
        curl -fsSL "https://www.python.org/ftp/python/$VERSION/Python-$VERSION.tar.xz" \
          | tar -xJ -C "$src" --strip-components=1

        # The interpreter is only ever run by the build, so it is not optimized:
        # --enable-optimizations triples the build for a speed-up nothing here sees.
        ( cd "$src" && ./configure --prefix="$PREFIX" --with-ensurepip=install )
        make -C "$src" -j"$(nproc)"
        make -C "$src" install
        rm -rf "$src"

    - name: Report the interpreter
      shell: bash
      env:
        PREFIX: ${{ inputs.prefix }}
      run: |
        echo "$PREFIX/bin" >> "$GITHUB_PATH"

        python="$PREFIX/bin/python3"
        "$python" --version
        "$python" -m pip --version

        # A module that failed to build is missing rather than broken, and the
        # first thing to notice would be aqtinstall failing to unpack Qt.
        "$python" -c 'import bz2, ctypes, lzma, ssl, zlib'
