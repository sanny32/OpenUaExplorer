name: Set up OpenSSL
description: >-
  Provides the OpenSSL the build links against and exports OPENSSL_ROOT_DIR.
  On Linux it builds the OpenSSL the Qt installer ships as source, because that
  is the one the package bundles; elsewhere it takes a prebuilt one.

inputs:
  qt-version:
    description: 'The Qt whose OpenSSL source is built; part of the cache key'
    required: false
    default: ''
  prefix:
    description: 'Where the Linux build is installed, relative to the workspace'
    required: false
    default: build/openssl
  windows-url:
    description: 'The prebuilt OpenSSL the Windows build uses'
    required: false
    default: 'https://download.firedaemon.com/FireDaemon-OpenSSL/openssl-3.5.7.zip'

outputs:
  root:
    description: 'The OpenSSL prefix, as exported in OPENSSL_ROOT_DIR'
    value: ${{ steps.root.outputs.root }}

runs:
  using: composite
  steps:
    # The Linux build takes minutes and its result depends only on the source the
    # Qt installer ships and on how openssl.sh configures it, so the whole prefix
    # is restored from a cache instead. ImageOS pins the key to the runner image:
    # the libraries carry that image's glibc and cannot be reused across images.
    - name: Cache OpenSSL build
      if: runner.os == 'Linux'
      uses: actions/cache@v5
      with:
        path: ${{ inputs.prefix }}
        key: openssl-${{ env.ImageOS }}-${{ runner.arch }}-${{ inputs.qt-version }}-${{ hashFiles('.github/linux/openssl.sh') }}

    # IQTA_TOOLS is where install-qt-action unpacks the tools, so the Qt install
    # has to have run before this action.
    - name: Build OpenSSL
      if: runner.os == 'Linux'
      shell: bash
      env:
        PREFIX: ${{ inputs.prefix }}
      run: |
        if [ -z "${IQTA_TOOLS:-}" ]; then
          echo "::error::IQTA_TOOLS is not set; install Qt with tools_openssl_src first"
          exit 1
        fi
        root="$GITHUB_WORKSPACE/$PREFIX"
        bash .github/linux/openssl.sh "$IQTA_TOOLS/OpenSSLv3/src" "$root"
        echo "OPENSSL_ROOT_DIR=$root" >> "$GITHUB_ENV"

    - name: Download OpenSSL
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        URL: ${{ inputs.windows-url }}
      run: |
        Invoke-WebRequest -Uri $env:URL -OutFile openssl.zip
        Expand-Archive openssl.zip -DestinationPath C:\openssl-dist -Force
        $root = (Get-ChildItem C:\openssl-dist -Recurse -Directory -Filter x64 |
          Select-Object -First 1).FullName
        if (-not $root) {
          Write-Error 'The archive holds no x64 build'
          exit 1
        }
        "OPENSSL_ROOT_DIR=$root" >> $env:GITHUB_ENV

    - name: Install OpenSSL
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install openssl@3
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

    - name: Report the prefix
      id: root
      shell: bash
      run: |
        echo "root=$OPENSSL_ROOT_DIR" >> "$GITHUB_OUTPUT"
        echo "OpenSSL is in $OPENSSL_ROOT_DIR"
