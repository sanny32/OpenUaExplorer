name: Determine project version
description: >-
  Derives the version of the build from the project and the ref, and maps it onto
  the version each package format needs.

inputs:
  cmakelists:
    description: 'The CMakeLists.txt that declares the project version'
    required: false
    default: src/CMakeLists.txt
  revision:
    description: 'The packaging revision of an unchanged upstream version'
    required: false
    default: '1'

outputs:
  version:
    description: 'The upstream version, <major>.<minor>.<patch>'
    value: ${{ steps.version.outputs.version }}
  major:
    description: 'The major version'
    value: ${{ steps.version.outputs.major }}
  minor:
    description: 'The minor version'
    value: ${{ steps.version.outputs.minor }}
  patch:
    description: 'The patch version'
    value: ${{ steps.version.outputs.patch }}
  prerelease:
    description: 'The pre-release suffix of the tag, empty when there is none'
    value: ${{ steps.version.outputs.prerelease }}
  sha:
    description: 'The short commit the build was made from'
    value: ${{ steps.version.outputs.sha }}
  releaseDate:
    description: 'The date of that commit, as AppStream spells it'
    value: ${{ steps.version.outputs.releaseDate }}
  appVersion:
    description: 'The version the application reports, and AppStream carries'
    value: ${{ steps.version.outputs.appVersion }}
  debVersion:
    description: 'The Debian version, revision included'
    value: ${{ steps.version.outputs.debVersion }}
  rpmVersion:
    description: 'The RPM Version field'
    value: ${{ steps.version.outputs.rpmVersion }}
  rpmRelease:
    description: 'The RPM Release field'
    value: ${{ steps.version.outputs.rpmRelease }}
  fileVersion:
    description: 'The four-part numeric version a Windows resource needs'
    value: ${{ steps.version.outputs.fileVersion }}

runs:
  using: composite
  steps:
    - id: version
      shell: bash
      env:
        CMAKELISTS: ${{ inputs.cmakelists }}
        REVISION: ${{ inputs.revision }}
      run: |
        version="$(
          sed -nE '/^project\(ouaexp([[:space:]]|$)/,/\)/ s/.*VERSION[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' "$CMAKELISTS" \
            | head -n1
        )"
        if [[ ! $version =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          echo "::error::Could not read the project version from $CMAKELISTS"
          exit 1
        fi
        major="${BASH_REMATCH[1]}"
        minor="${BASH_REMATCH[2]}"
        patch="${BASH_REMATCH[3]}"

        # Mirrors src/cmake/project_version.cmake: a tag supplies the version,
        # everything else is a <major>.<minor>-dev snapshot named after the commit.
        prerelease=''
        tagged=''
        sha="$(git rev-parse --short HEAD)"
        if [[ $GITHUB_REF =~ ^refs/tags/v(.+)$ ]]; then
          tag_version="${BASH_REMATCH[1]}"
          if [[ ! $tag_version =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
            echo "::error::Tag v$tag_version is not <major>.<minor>.<patch>[-prerelease]"
            exit 1
          fi
          tagged='yes'
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          prerelease="${BASH_REMATCH[5]}"
          version="$major.$minor.$patch"
          app_version="$tag_version"
        else
          app_version="$major.$minor-dev.g$sha"
        fi

        # '~' sorts below the end of a string in dpkg and rpm, so pre-releases and
        # dev snapshots stay below the release. RPM forbids '-' in Version.
        if [ -n "$prerelease" ]; then
          deb_upstream="$version~$prerelease"
          rpm_version="$version~${prerelease//-/.}"
        elif [ -n "$tagged" ]; then
          deb_upstream="$version"
          rpm_version="$version"
        else
          deb_upstream="$major.$minor~dev.g$sha"
          rpm_version="$deb_upstream"
        fi

        # The commit date, so rebuilding a commit yields the same metadata.
        release_date="$(git log -1 --format=%cs)"

        # VIProductVersion rejects a suffix.
        file_version="$major.$minor.$patch.0"

        {
          echo "version=$version"
          echo "major=$major"
          echo "minor=$minor"
          echo "patch=$patch"
          echo "prerelease=$prerelease"
          echo "sha=$sha"
          echo "releaseDate=$release_date"
          echo "appVersion=$app_version"
          echo "debVersion=$deb_upstream-$REVISION"
          echo "rpmVersion=$rpm_version"
          echo "rpmRelease=$REVISION"
          echo "fileVersion=$file_version"
        } >> "$GITHUB_OUTPUT"

        echo "Version $app_version from ${GITHUB_REF#refs/} (g$sha, ${release_date})"
