name: Set up linuxdeployqt
description: >-
  Installs the linuxdeployqt release the AppDir is deployed with and puts it on
  PATH. The tool has no versioned releases: 'continuous' is the only one there is,
  so the download is pinned to a tag of the repository instead, and cached, to keep
  a build from silently changing under a new upload.

inputs:
  release:
    description: 'The linuxdeployqt release the AppImage is downloaded from'
    required: false
    default: continuous
  prefix:
    description: 'Where the tool is installed, and prepended to PATH'
    required: false
    default: /opt/linuxdeployqt

outputs:
  path:
    description: 'The linuxdeployqt executable'
    value: ${{ steps.install.outputs.path }}

runs:
  using: composite
  steps:
    # Only x86_64 builds exist; fail clearly rather than 404 on the download.
    - name: Identify the architecture
      id: arch
      shell: bash
      run: |
        arch="$(uname -m)"
        case "$arch" in
          x86_64|amd64) arch=x86_64 ;;
          *)
            echo "::error::linuxdeployqt has no release for $arch"
            exit 1
            ;;
        esac
        echo "arch=$arch" >> "$GITHUB_OUTPUT"

    - name: Cache linuxdeployqt
      id: cache
      uses: actions/cache@v5
      with:
        path: ${{ inputs.prefix }}
        key: linuxdeployqt-${{ inputs.release }}-${{ steps.arch.outputs.arch }}

    - name: Download linuxdeployqt
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        RELEASE: ${{ inputs.release }}
        PREFIX: ${{ inputs.prefix }}
        ARCH: ${{ steps.arch.outputs.arch }}
      run: |
        mkdir -p "$PREFIX/bin"
        curl -fsSL -o "$PREFIX/bin/linuxdeployqt" \
          "https://github.com/probonopd/linuxdeployqt/releases/download/$RELEASE/linuxdeployqt-$RELEASE-$ARCH.AppImage"
        chmod +x "$PREFIX/bin/linuxdeployqt"

    # No FUSE in a container, so APPIMAGE_EXTRACT_AND_RUN; exported job-wide for
    # the appimagetool linuxdeployqt invokes in turn.
    - name: Report the tool
      id: install
      shell: bash
      env:
        PREFIX: ${{ inputs.prefix }}
      run: |
        echo "$PREFIX/bin" >> "$GITHUB_PATH"
        echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"
        echo "path=$PREFIX/bin/linuxdeployqt" >> "$GITHUB_OUTPUT"

        APPIMAGE_EXTRACT_AND_RUN=1 "$PREFIX/bin/linuxdeployqt" --version
