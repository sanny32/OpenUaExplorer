name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
  push:
    tags:
      - 'v*'

concurrency:
  group: package-appimage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  QT_VERSION: '6.9.3'
  QT_MODULES: qtcharts
  QT_TOOLS: tools_opensslv3_src
  DEBIAN_FRONTEND: noninteractive

jobs:
  # An AppImage carries every library it is not allowed to assume, but it still runs
  # against the glibc of the host, which is never older than the one it was built
  # against. The oldest release the project targets sets that floor, so the AppImage
  # is built in the same container the .deb is.
  appimage:
    name: Build AppImage version '${{ inputs.branch || github.ref_name }}'
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 90

    outputs:
      arch: ${{ steps.package.outputs.arch }}
      name: ${{ steps.package.outputs.name }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git sudo unzip xz-utils zstd

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The container ships a Python too old for the aqtinstall install-qt-action
      # runs below, and for the wheels the build tools are installed from.
      - name: Set up Python
        uses: ./.github/actions/setup-python

      # The GTK and Wayland libraries are not linked against: the Qt platform and
      # platform theme plugins load them, and linuxdeployqt bundles them from this
      # container, so they have to be installed for it to resolve them at all.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential perl pkg-config file \
            desktop-file-utils appstream-util \
            libgl1-mesa-dev libsecret-1-dev \
            libgtk-3-0 libwayland-cursor0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxcb-util1 libxkbcommon-x11-0
          python3 -m pip install --upgrade 'cmake>=3.22,<4' ninja patchelf
          cmake --version
          ninja --version
          patchelf --version

      - name: Determine version
        id: version
        uses: ./.github/actions/project-version

      - name: Determine package name
        id: package
        run: |
          arch="$(uname -m)"
          package="OpenUaExplorer-${{ steps.version.outputs.appVersion }}-${arch}.AppImage"

          {
            echo "arch=$arch"
            echo "name=$package"
          } >> "$GITHUB_OUTPUT"
          echo "Building $package"

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          tools: ${{ env.QT_TOOLS }}
          cache: true
          setup-python: false

      # The AppImage carries its own OpenSSL rather than relying on the host's: the
      # releases it has to run on ship anything from OpenSSL 1.1 upwards, and the
      # OpcUa backend needs 3.
      - name: Set up OpenSSL
        uses: ./.github/actions/setup-openssl
        with:
          qt-version: ${{ env.QT_VERSION }}

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-ubuntu-20.04-${{ env.QT_VERSION }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      # OUAEXP_INSTALL_PRIVATE_LIBDIR=OFF is what turns the install tree into the FHS
      # layout linuxdeployqt insists on - see src/cmake/install_linux.cmake, which
      # explains why the private-libdir layout the packages use cannot be deployed.
      # OPENSSL_ROOT_DIR is passed explicitly because qtopcua.cmake forwards the CMake
      # variable, not the environment one, to the Qt OpcUa sub-build.
      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOUAEXP_BUILD_TESTS=OFF
          -DOUAEXP_INSTALL_PRIVATE_LIBDIR=OFF
          "-DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR"
          "-DPROJECT_PRERELEASE=${{ steps.version.outputs.prerelease }}"

      - name: Build
        run: cmake --build build --parallel --target ouaexp

      - name: Stage AppDir
        run: |
          rm -rf AppDir
          DESTDIR="$PWD/AppDir" cmake --install build --prefix /usr

          metainfo=AppDir/usr/share/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml
          mkdir -p "$(dirname "$metainfo")"
          sed -e "s|@VERSION@|${{ steps.version.outputs.appVersion }}|" \
              -e "s|@RELEASE_DATE@|${{ steps.version.outputs.releaseDate }}|" \
              .github/linux/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml.in \
              > "$metainfo"
          chmod 0644 "$metainfo"

      - name: Validate desktop entry and AppStream metadata
        run: |
          desktop-file-validate AppDir/usr/share/applications/*.desktop
          appstream-util validate-relax --nonet AppDir/usr/share/metainfo/*.metainfo.xml

          test -f AppDir/usr/share/mime/packages/io.github.sanny32.OpenUaExplorer.xml
          test -f AppDir/usr/share/icons/hicolor/scalable/apps/io.github.sanny32.OpenUaExplorer.svg
          for size in 16 24 32 48 64 128 256; do
            test -f "AppDir/usr/share/icons/hicolor/${size}x${size}/mimetypes/application-x-ouaexp-session.png"
          done

      - name: Set up linuxdeployqt
        uses: ./.github/actions/setup-linuxdeployqt

      # linuxdeployqt is given the desktop entry, not the executable, so that it takes
      # the AppImage name, the icon and the AppRun from it. The Qt OpcUa library and
      # its opcua plugin are already in the AppDir - install_linux.cmake put them
      # there - so it bundles them along with the rest and resolves their
      # dependencies, the OpenSSL among them, which is why the prefix built above has
      # to be on the loader's path: it is not installed anywhere the loader looks.
      #
      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.appVersion }}
        run: |
          export LD_LIBRARY_PATH="$OPENSSL_ROOT_DIR/lib:${LD_LIBRARY_PATH:-}"

          # Use the host libsystemd to avoid raising the bundle's glibc floor.
          linuxdeployqt AppDir/usr/share/applications/*.desktop \
            -qmake="$QT_ROOT_DIR/bin/qmake" \
            -exclude-libs=libsystemd.so \
            -extra-plugins=iconengines,platformthemes,tls \
            -appimage

          # The name linuxdeployqt derives from the desktop entry carries the product
          # name with spaces turned into underscores; rename it to the CamelCase
          # Name-version-arch.AppImage form the AppImage ecosystem expects.
          built="$(find . -maxdepth 1 -name '*.AppImage' -newer AppDir -print -quit)"
          if [ -z "$built" ]; then
            echo "::error::linuxdeployqt produced no AppImage"
            exit 1
          fi
          mv "$built" "${{ steps.package.outputs.name }}"
          chmod +x "${{ steps.package.outputs.name }}"

      - name: Inspect AppImage
        run: |
          ls -l "${{ steps.package.outputs.name }}"
          ./"${{ steps.package.outputs.name }}" --appimage-extract > /dev/null

          if find squashfs-root/usr/lib -maxdepth 1 -name 'libsystemd.so*' \
              -print -quit | grep -q .; then
            echo "::error::The AppImage bundles libsystemd and raises its glibc floor"
            exit 1
          fi

          # The OpcUa backend resolving OpenSSL outside the AppImage means the bundled
          # OpenSSL is not being used, and the AppImage is back to needing one on the
          # host, which is the whole reason it carries its own.
          if ldd squashfs-root/usr/plugins/opcua/*.so | grep -E 'libssl|libcrypto' \
              | grep -qv squashfs-root/; then
            echo "::error::OpenSSL resolves outside the AppImage"
            exit 1
          fi
          rm -rf squashfs-root

      - name: Compute checksum
        run: sha256sum "${{ steps.package.outputs.name }}" > "${{ steps.package.outputs.name }}.sha256"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v6
        with:
          name: ouaexp-appimage-${{ steps.package.outputs.arch }}
          path: |
            ${{ steps.package.outputs.name }}
            ${{ steps.package.outputs.name }}.sha256
          if-no-files-found: error

  # The AppImage is verified in a job of its own because the container the build runs
  # in has no Docker: the daemon lives on the runner, and a bind mount from inside the
  # container would name paths the daemon cannot see. The runner itself has both.
  verify:
    name: Verify AppImage
    runs-on: ubuntu-latest
    needs: appimage
    timeout-minutes: 30

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v8
        with:
          name: ouaexp-appimage-${{ needs.appimage.outputs.arch }}

      # The images are the ones the .deb and the .rpm are verified on, minus the
      # package manager: an AppImage is not installed, it is run. The program is a GUI
      # application with no batch mode, so it is checked by resolving its libraries
      # instead of starting it. FUSE is what a bare container lacks, so the AppImage
      # is unpacked rather than mounted - the same thing its runtime does under
      # APPIMAGE_EXTRACT_AND_RUN.
      - name: Verify the AppImage runs
        env:
          PKG: ${{ needs.appimage.outputs.name }}
          IMAGES: >-
            debian:12
            debian:13
            ubuntu:22.04
            ubuntu:24.04
            ubuntu:26.04
            fedora:43
            registry.astralinux.ru/astra/ubi17:latest
            registry.astralinux.ru/astra/ubi18:latest
        run: |
          chmod +x "$PKG"

          status=0
          for image in $IMAGES; do
            echo "::group::$image"
            if ! docker run --rm -e PKG -v "$PWD:/pkg" -w /tmp "$image" sh -eux -c '
              install_desktop_runtime() {
                if command -v dnf > /dev/null; then
                  dnf -y --setopt=install_weak_deps=False install \
                    fontconfig freetype keyutils-libs libcom_err libgpg-error libX11 \
                    libglvnd-egl libglvnd-glx libglvnd-opengl systemd-libs
                  return
                fi

                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends \
                  libcom-err2 libegl1 libfontconfig1 libfreetype6 libgl1 \
                  libglx0 libgpg-error0 libkeyutils1 libopengl0 libsystemd0 libx11-6
              }

              # linuxdeployqt leaves base-system ABI libraries on the desktop host.
              install_desktop_runtime

              cp "/pkg/$PKG" ./app.AppImage
              ./app.AppImage --appimage-extract > /dev/null

              if ldd -r squashfs-root/usr/bin/ouaexp | grep -E "not found|undefined symbol"; then
                echo "The AppImage has unresolved libraries or symbols"
                exit 1
              fi

              for plugin in squashfs-root/usr/plugins/platforms/libqxcb.so \
                            squashfs-root/usr/plugins/opcua/*.so; do
                if ldd -r "$plugin" | grep -E "not found"; then
                  echo "$plugin has unresolved libraries"
                  exit 1
                fi
              done
            '; then
              echo "::error::The AppImage does not run on $image"
              status=1
            fi
            echo "::endgroup::"
          done
          exit "$status"

      - name: Attach AppImage to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ needs.appimage.outputs.prerelease != '' }}
          files: |
            ${{ needs.appimage.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
