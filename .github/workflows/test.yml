name: Test CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/test.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Qt ${{ matrix.qt }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt: '6.9.3'

          - os: windows-latest
            qt: '6.9.3'
            openssl_url: 'https://download.firedaemon.com/FireDaemon-OpenSSL/openssl-3.5.7.zip'

          - os: macos-26
            qt: '6.9.3'
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES=arm64'
    env:
      # Run Qt GUI/Test binaries without a real display.
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus \
            ninja-build \
            libsecret-1-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ninja openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          modules: qtcharts
          cache: true

      - name: Set up OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri '${{ matrix.openssl_url }}' -OutFile openssl.zip
          Expand-Archive openssl.zip -DestinationPath C:\openssl-dist -Force
          $root = (Get-ChildItem C:\openssl-dist -Recurse -Directory -Filter x64 |
            Select-Object -First 1).FullName
          "OPENSSL_ROOT_DIR=$root" >> $env:GITHUB_ENV

      - name: Install test dependencies
        run: python -m pip install -r tools/requirements.txt

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-${{ matrix.os }}-${{ matrix.qt }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          -DOUAEXP_BUILD_TESTS=ON
          ${{ matrix.cmake_extra }}

      - name: Build and run tests (Linux)
        if: runner.os == 'Linux'
        run: dbus-run-session -- cmake --build build --config Release --parallel --target ouaexp ouaexp_check

      - name: Build and run tests
        if: runner.os != 'Linux'
        run: cmake --build build --config Release --parallel --target ouaexp ouaexp_check
