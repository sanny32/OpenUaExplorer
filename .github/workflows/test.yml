name: Test

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Qt ${{ matrix.qt }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt: '6.9.3'
            use_qt: '-DUSE_QT6=ON'
            cmake_extra: ''
          - os: windows-latest
            qt: '6.9.3'
            use_qt: '-DUSE_QT6=ON'
            cmake_extra: '-DOUAEXP_OPENSSL_ROOT_DIR='
          - os: macos-26
            qt: '6.9.3'
            use_qt: '-DUSE_QT6=ON'
            cmake_extra: '-DOUAEXP_OPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR'
          - os: ubuntu-latest
            qt: '5.15.2'
            use_qt: '-DUSE_QT5=ON'
            cmake_extra: '-DOUAEXP_FETCH_QTOPCUA=OFF'
          - os: windows-latest
            qt: '5.15.2'
            use_qt: '-DUSE_QT5=ON'
            cmake_extra: '-DOUAEXP_FETCH_QTOPCUA=OFF -DOUAEXP_OPENSSL_ROOT_DIR='
    env:
      # Run Qt GUI/Test binaries without a real display.
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libsecret-1-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ninja openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          modules: qtopcua
          cache: true

      - name: Install test dependencies
        run: python -m pip install -r tools/requirements.txt

      - name: Cache Qt OpcUa build
        uses: actions/cache@v4
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-${{ matrix.os }}-${{ matrix.qt }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          ${{ matrix.use_qt }}
          ${{ matrix.cmake_extra }}

      - name: Build and run tests
        run: cmake --build build --config Release --parallel --target ouaexp_check
