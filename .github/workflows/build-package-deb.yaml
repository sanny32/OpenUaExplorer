name: Build Debian package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
  push:
    tags:
      - 'v*'

concurrency:
  group: package-deb-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  QT_VERSION: '6.9.3'
  QT_MODULES: qtcharts
  QT_TOOLS: tools_opensslv3_src
  MAINTAINER: Alexandr Ananev <mail@ananev.org>
  DEBIAN_FRONTEND: noninteractive

jobs:
  deb:
    name: Build .deb version '${{ inputs.branch || github.ref_name }}'
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 90

    outputs:
      arch: ${{ steps.package.outputs.arch }}
      name: ${{ steps.package.outputs.name }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git sudo unzip xz-utils zstd

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Python
        uses: ./.github/actions/setup-python

      # GTK and Wayland are loaded at runtime by Qt plugins; installed here so
      # dpkg-shlibdeps turns them into Depends instead of bundling them.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential perl pkg-config \
            dpkg-dev fakeroot lintian \
            desktop-file-utils appstream-util \
            libgl1-mesa-dev libsecret-1-dev \
            libgtk-3-0 libwayland-cursor0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxcb-util1 libxkbcommon-x11-0
          python3 -m pip install --upgrade 'cmake>=3.22,<4' ninja patchelf
          cmake --version
          ninja --version
          patchelf --version

      - name: Determine version
        id: version
        uses: ./.github/actions/project-version

      - name: Determine package name
        id: package
        run: |
          arch="$(dpkg-architecture -qDEB_HOST_ARCH)"
          package="ouaexp_${{ steps.version.outputs.debVersion }}_${arch}.deb"

          {
            echo "arch=$arch"
            echo "name=$package"
          } >> "$GITHUB_OUTPUT"
          echo "Building $package"

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          tools: ${{ env.QT_TOOLS }}
          cache: true
          setup-python: false

      # Bundled: target distributions (e.g. Astra Linux 1.7) have no libssl3.
      - name: Set up OpenSSL
        uses: ./.github/actions/setup-openssl
        with:
          qt-version: ${{ env.QT_VERSION }}

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-ubuntu-20.04-${{ env.QT_VERSION }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      # qtopcua.cmake forwards the CMake variable, not the env one, to the sub-build.
      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOUAEXP_BUILD_TESTS=OFF
          "-DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR"
          "-DPROJECT_PRERELEASE=${{ steps.version.outputs.prerelease }}"

      - name: Build
        run: cmake --build build --parallel --target ouaexp

      # bundle.sh stages the app with its Qt as a private tree under /usr/lib/ouaexp.
      - name: Stage package root
        run: |
          rm -rf pkgroot
          bash .github/linux/bundle.sh \
            "$PWD/pkgroot" \
            "$PWD/build/app/ouaexp" \
            "$QT_ROOT_DIR" \
            "$PWD/build/_deps/qtopcua-install" \
            "$OPENSSL_ROOT_DIR"

          cp -r .github/linux/usr/. pkgroot/usr/

          metainfo=pkgroot/usr/share/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml
          mkdir -p "$(dirname "$metainfo")"
          sed -e "s|@VERSION@|${{ steps.version.outputs.appVersion }}|" \
              -e "s|@RELEASE_DATE@|${{ steps.version.outputs.releaseDate }}|" \
              .github/linux/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml.in \
              > "$metainfo"
          chmod 0644 "$metainfo"

          install -D -m 0644 .github/linux/deb/copyright \
            pkgroot/usr/share/doc/ouaexp/copyright
          install -D -m 0644 .github/linux/deb/lintian-overrides \
            pkgroot/usr/share/lintian/overrides/ouaexp

          find pkgroot -type d -exec chmod 0755 {} +

      - name: Validate desktop entry and AppStream metadata
        run: |
          desktop-file-validate pkgroot/usr/share/applications/*.desktop
          appstream-util validate-relax --nonet pkgroot/usr/share/metainfo/*.metainfo.xml

          qapt_icon="$(find pkgroot/usr/share/icons -type f | sort | tail -n 1)"
          if [ "$qapt_icon" != \
               "pkgroot/usr/share/icons/hicolor/scalable/apps/io.github.sanny32.OpenUaExplorer.svg" ]; then
            echo "::error::QApt would display the wrong package icon: $qapt_icon"
            exit 1
          fi

      - name: Generate control file
        run: |
          mkdir -p debian pkgroot/DEBIAN

          sed -e "s|@ARCH@|${{ steps.package.outputs.arch }}|" \
              -e "s|@MAINTAINER@|${{ env.MAINTAINER }}|" \
              .github/linux/deb/control.in > debian/control

          cat > debian/changelog <<EOF
          ouaexp (${{ steps.version.outputs.debVersion }}) unstable; urgency=medium

            * Automated build of ${{ github.sha }}.

           -- ${{ env.MAINTAINER }}  $(date -uR)
          EOF

          # GTK package names differ across target releases, so control.in depends
          # on GTK by hand and libqgtk3.so is left out of the scan.
          plugins="$(find pkgroot/usr/lib/ouaexp/plugins -name '*.so' \
            ! -name 'libqgtk3.so')"

          # -l resolves the bundled Qt libs; --ignore-missing-info tolerates their
          # missing shlibs entries.
          dpkg-shlibdeps --ignore-missing-info \
            -l"$PWD/pkgroot/usr/lib/ouaexp/lib" \
            -Tdebian/substvars \
            pkgroot/usr/lib/ouaexp/bin/ouaexp \
            pkgroot/usr/lib/ouaexp/lib/*.so* \
            $plugins

          # Older targets (e.g. Astra Linux 1.7) ship libgcc1, not libgcc-s1; allow either.
          sed -i 's/libgcc-s1 ([^)]*)/& | libgcc1/' debian/substvars
          cat debian/substvars

          dpkg-gencontrol -pouaexp -Ppkgroot -Tdebian/substvars

      - name: Build package
        run: |
          gzip -9n -c debian/changelog > pkgroot/usr/share/doc/ouaexp/changelog.Debian.gz
          chmod 0644 pkgroot/usr/share/doc/ouaexp/changelog.Debian.gz

          # md5sums must list every shipped file except the control area itself.
          ( cd pkgroot && find . -type f ! -path './DEBIAN/*' -printf '%P\0' \
              | xargs -0 md5sum > DEBIAN/md5sums )
          fakeroot dpkg-deb --root-owner-group --build pkgroot \
            "${{ steps.package.outputs.name }}"

      - name: Inspect package
        run: |
          dpkg-deb --info "${{ steps.package.outputs.name }}"
          dpkg-deb --contents "${{ steps.package.outputs.name }}"

          # A libssl dependency means the bundled OpenSSL is not being resolved.
          if dpkg-deb -f "${{ steps.package.outputs.name }}" Depends | grep -q libssl; then
            echo "::error::The package still depends on the distribution OpenSSL"
            exit 1
          fi

          # This lintian predates --fail-on; check the tags instead.
          lintian --no-tag-display-limit "${{ steps.package.outputs.name }}" \
            > lintian.log || true
          cat lintian.log

          if grep -q '^E:' lintian.log; then
            echo "::error::lintian reported errors"
            exit 1
          fi

      - name: Compute checksum
        run: sha256sum "${{ steps.package.outputs.name }}" > "${{ steps.package.outputs.name }}.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ouaexp-deb-${{ steps.package.outputs.arch }}
          path: |
            ${{ steps.package.outputs.name }}
            ${{ steps.package.outputs.name }}.sha256
          if-no-files-found: error

  verify:
    name: Verify .deb
    runs-on: ubuntu-latest
    needs: deb
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: ouaexp-deb-${{ needs.deb.outputs.arch }}

      - name: Verify the package installs
        uses: ./.github/actions/verify-linux-package
        with:
          package: ${{ needs.deb.outputs.name }}
          package-manager: deb
          images: >-
            debian:12
            debian:13
            ubuntu:22.04
            ubuntu:24.04
            ubuntu:26.04
            registry.astralinux.ru/astra/ubi17:latest
            registry.astralinux.ru/astra/ubi18:latest

      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ needs.deb.outputs.prerelease != '' }}
          files: |
            ${{ needs.deb.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
