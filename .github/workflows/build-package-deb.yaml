name: Build Debian package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
  push:
    tags:
      - 'v*'

concurrency:
  group: package-deb-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  QT_VERSION: '6.9.3'
  QT_MODULES: qtcharts

jobs:
  deb:
    name: Build .deb
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config patchelf \
            dpkg-dev fakeroot lintian \
            desktop-file-utils appstream-util \
            libgl1-mesa-dev libssl-dev libsecret-1-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxcb-util1 libxkbcommon-x11-0

      - name: Determine version
        id: version
        run: |
          version="$(
            sed -nE '/^project\(ouaexp([[:space:]]|$)/,/\)/ s/.*VERSION[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' src/CMakeLists.txt \
              | head -n1
          )"
          if [[ ! $version =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Could not read the project version from src/CMakeLists.txt"
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          # Mirror src/cmake/project_version.cmake, then map onto a Debian version.
          # A pre-release must sort *before* its final release, and '-' separates the
          # Debian revision, so 'v1.0.0-b1' becomes '1.0.0~b1' and dev snapshots get a
          # '~dev' suffix that keeps them below every tagged release.
          prerelease=''
          ref='${{ github.ref }}'
          if [[ $ref =~ ^refs/tags/v(.+)$ ]]; then
            tag_version="${BASH_REMATCH[1]}"
            if [[ ! $tag_version =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
              echo "::error::Tag v$tag_version is not <major>.<minor>.<patch>[-prerelease]"
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            prerelease="${BASH_REMATCH[5]}"
            if [ -n "$prerelease" ]; then
              upstream="$major.$minor.$patch~$prerelease"
            else
              upstream="$major.$minor.$patch"
            fi
          else
            upstream="$major.$minor~dev.g$(git rev-parse --short HEAD)"
          fi

          # AppStream carries the upstream version rather than the Debian one, so it has
          # no revision and spells a pre-release the way the tag does. The release date is
          # the date of the commit being built, so rebuilding a commit yields the same file.
          if [ -n "$prerelease" ]; then
            app_version="$major.$minor.$patch-$prerelease"
          elif [[ $ref =~ ^refs/tags/v ]]; then
            app_version="$major.$minor.$patch"
          else
            app_version="$major.$minor.$patch-dev.g$(git rev-parse --short HEAD)"
          fi
          release_date="$(git log -1 --format=%cs)"

          deb_version="$upstream-1"
          arch="$(dpkg-architecture -qDEB_HOST_ARCH)"
          package="ouaexp_${deb_version}_${arch}.deb"

          {
            echo "prerelease=$prerelease"
            echo "debVersion=$deb_version"
            echo "appVersion=$app_version"
            echo "releaseDate=$release_date"
            echo "arch=$arch"
            echo "package=$package"
          } >> "$GITHUB_OUTPUT"
          echo "Building $package"

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-ubuntu-22.04-${{ env.QT_VERSION }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOUAEXP_BUILD_TESTS=OFF
          "-DPROJECT_PRERELEASE=${{ steps.version.outputs.prerelease }}"

      - name: Build
        run: cmake --build build --parallel --target ouaexp

      # The application is not installed with `cmake --install`: the package has to
      # carry the Qt build it was compiled against, so bundle.sh assembles the whole
      # private tree under /usr/lib/ouaexp instead.
      - name: Stage package root
        run: |
          rm -rf pkgroot
          bash .github/linux/bundle.sh \
            "$PWD/pkgroot" \
            "$PWD/build/app/ouaexp" \
            "$QT_ROOT_DIR" \
            "$PWD/build/_deps/qtopcua-install"

          cp -r .github/linux/usr/. pkgroot/usr/

          metainfo=pkgroot/usr/share/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml
          mkdir -p "$(dirname "$metainfo")"
          sed -e "s|@VERSION@|${{ steps.version.outputs.appVersion }}|" \
              -e "s|@RELEASE_DATE@|${{ steps.version.outputs.releaseDate }}|" \
              .github/linux/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml.in \
              > "$metainfo"
          chmod 0644 "$metainfo"

          install -D -m 0644 .github/linux/deb/copyright \
            pkgroot/usr/share/doc/ouaexp/copyright
          install -D -m 0644 .github/linux/deb/lintian-overrides \
            pkgroot/usr/share/lintian/overrides/ouaexp

          find pkgroot -type d -exec chmod 0755 {} +

      - name: Validate desktop entry and AppStream metadata
        run: |
          desktop-file-validate pkgroot/usr/share/applications/*.desktop
          appstream-util validate-relax --nonet pkgroot/usr/share/metainfo/*.metainfo.xml

      - name: Generate control file
        run: |
          mkdir -p debian pkgroot/DEBIAN

          sed -e "s|@ARCH@|${{ steps.version.outputs.arch }}|" \
              -e "s|@MAINTAINER@|Alexandr Ananev <mail@ananev.org>|" \
              .github/linux/deb/control.in > debian/control

          cat > debian/changelog <<EOF
          ouaexp (${{ steps.version.outputs.debVersion }}) unstable; urgency=medium

            * Automated build of ${{ github.sha }}.

           -- Alexandr Ananev <mail@ananev.org>  $(date -uR)
          EOF

          # The bundled Qt libraries have no shlibs entries of their own; -l lets
          # dpkg-shlibdeps resolve them while --ignore-missing-info keeps that from
          # being fatal. Every other dependency is a real distribution package, and
          # scanning the plugins too catches what only they pull in, such as xcb.
          dpkg-shlibdeps --ignore-missing-info \
            -l"$PWD/pkgroot/usr/lib/ouaexp/lib" \
            -Tdebian/substvars \
            pkgroot/usr/lib/ouaexp/bin/ouaexp \
            pkgroot/usr/lib/ouaexp/lib/*.so* \
            pkgroot/usr/lib/ouaexp/plugins/*/*.so

          dpkg-gencontrol -pouaexp -Ppkgroot -Tdebian/substvars

      - name: Build package
        run: |
          gzip -9n -c debian/changelog > pkgroot/usr/share/doc/ouaexp/changelog.Debian.gz
          chmod 0644 pkgroot/usr/share/doc/ouaexp/changelog.Debian.gz

          # md5sums must list every shipped file except the control area itself.
          ( cd pkgroot && find . -type f ! -path './DEBIAN/*' -printf '%P\0' \
              | xargs -0 md5sum > DEBIAN/md5sums )
          fakeroot dpkg-deb --root-owner-group --build pkgroot \
            "${{ steps.version.outputs.package }}"

      - name: Inspect package
        run: |
          dpkg-deb --info "${{ steps.version.outputs.package }}"
          dpkg-deb --contents "${{ steps.version.outputs.package }}"
          lintian --no-tag-display-limit --fail-on error \
            "${{ steps.version.outputs.package }}"

      # Installing from the .deb resolves the generated Depends against the archive,
      # so a missing runtime dependency fails here rather than on a user's machine.
      # The program is a GUI application with no batch mode, so it is checked by
      # resolving its libraries instead of starting it.
      - name: Verify the package installs
        env:
          PKG: ${{ steps.version.outputs.package }}
          IMAGES: >-
            debian:12
            debian:13
            ubuntu:22.04
            ubuntu:24.04
            ubuntu:26.04
            registry.astralinux.ru/astra/ubi18:latest
        run: |
          status=0
          for image in $IMAGES; do
            echo "::group::$image"
            if ! docker run --rm -e PKG -v "$PWD:/pkg" -w /pkg "$image" bash -eux -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y "./$PKG"
              test -L /usr/bin/ouaexp
              if ldd -r /usr/lib/ouaexp/bin/ouaexp | grep -E "not found|undefined symbol"; then
                echo "The installed binary has unresolved libraries or symbols"
                exit 1
              fi
              apt-get remove -y ouaexp
            '; then
              echo "::error::The package does not install on $image"
              status=1
            fi
            echo "::endgroup::"
          done
          exit "$status"

      - name: Compute checksum
        run: sha256sum "${{ steps.version.outputs.package }}" > "${{ steps.version.outputs.package }}.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ouaexp-deb-${{ steps.version.outputs.arch }}
          path: |
            ${{ steps.version.outputs.package }}
            ${{ steps.version.outputs.package }}.sha256
          if-no-files-found: error

      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease != '' }}
          files: |
            ${{ steps.version.outputs.package }}
          generate_release_notes: true
          fail_on_unmatched_files: true
