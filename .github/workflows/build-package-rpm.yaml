name: Build RPM package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
  push:
    tags:
      - 'v*'

concurrency:
  group: package-rpm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  QT_VERSION: '6.9.3'
  QT_MODULES: qtcharts
  QT_TOOLS: tools_opensslv3_src
  MAINTAINER: Alexandr Ananev <mail@ananev.org>
  DEBIAN_FRONTEND: noninteractive

jobs:
  rpm:
    name: Build .rpm version '${{ inputs.branch || github.ref_name }}'
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 90

    outputs:
      arch: ${{ steps.package.outputs.arch }}
      name: ${{ steps.package.outputs.name }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git sudo unzip xz-utils zstd

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The container ships a Python too old for the aqtinstall install-qt-action
      # runs below, and for the wheels the build tools are installed from.
      - name: Set up Python
        uses: ./.github/actions/setup-python

      # The package is built inside an older Ubuntu container so the glibc and
      # libstdc++ symbol versions the bundled binaries reference stay as low as
      # possible. The bundle carries its own Qt; rpmbuild only wraps the staged tree.
      #
      # The GTK and Wayland libraries are not linked against: the Qt platform and
      # platform theme plugins load them, and they stay a dependency of the package
      # rather than being bundled. They are installed because bundle.sh resolves the
      # plugins against this container, and rpmbuild turns their sonames into Requires.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential perl pkg-config \
            rpm file \
            desktop-file-utils appstream-util \
            libgl1-mesa-dev libsecret-1-dev \
            libgtk-3-0 libwayland-cursor0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxcb-util1 libxkbcommon-x11-0
          python3 -m pip install --upgrade 'cmake>=3.22,<4' ninja patchelf
          cmake --version
          ninja --version
          patchelf --version

      - name: Determine version
        id: version
        uses: ./.github/actions/project-version

      - name: Determine package name
        id: package
        run: |
          arch="$(uname -m)"
          package="ouaexp-${{ steps.version.outputs.rpmVersion }}-${{ steps.version.outputs.rpmRelease }}.$arch.rpm"

          {
            echo "arch=$arch"
            echo "name=$package"
          } >> "$GITHUB_OUTPUT"
          echo "Building $package"

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          tools: ${{ env.QT_TOOLS }}
          cache: true
          setup-python: false

      # The package carries its own OpenSSL rather than requesting the distribution's
      # libssl.so.3, which older distributions do not have. It is linked into the Qt
      # OpcUa backend below, and bundled.
      - name: Set up OpenSSL
        uses: ./.github/actions/setup-openssl
        with:
          qt-version: ${{ env.QT_VERSION }}

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-ubuntu-20.04-${{ env.QT_VERSION }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      # OPENSSL_ROOT_DIR is passed explicitly because qtopcua.cmake forwards the CMake
      # variable, not the environment one, to the Qt OpcUa sub-build.
      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOUAEXP_BUILD_TESTS=OFF
          "-DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR"
          "-DPROJECT_PRERELEASE=${{ steps.version.outputs.prerelease }}"

      - name: Build
        run: cmake --build build --parallel --target ouaexp

      # The application is not installed with `cmake --install`: the package has to
      # carry the Qt build it was compiled against, so bundle.sh assembles the whole
      # private tree under /usr/lib/ouaexp instead.
      - name: Stage package root
        run: |
          rm -rf pkgroot
          bash .github/linux/bundle.sh \
            "$PWD/pkgroot" \
            "$PWD/build/app/ouaexp" \
            "$QT_ROOT_DIR" \
            "$PWD/build/_deps/qtopcua-install" \
            "$OPENSSL_ROOT_DIR"

          cp -r .github/linux/usr/. pkgroot/usr/

          metainfo=pkgroot/usr/share/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml
          mkdir -p "$(dirname "$metainfo")"
          sed -e "s|@VERSION@|${{ steps.version.outputs.appVersion }}|" \
              -e "s|@RELEASE_DATE@|${{ steps.version.outputs.releaseDate }}|" \
              .github/linux/metainfo/io.github.sanny32.OpenUaExplorer.metainfo.xml.in \
              > "$metainfo"
          chmod 0644 "$metainfo"

          install -D -m 0644 LICENSE pkgroot/usr/share/licenses/ouaexp/LICENSE

          find pkgroot -type d -exec chmod 0755 {} +

      - name: Validate desktop entry and AppStream metadata
        run: |
          desktop-file-validate pkgroot/usr/share/applications/*.desktop
          appstream-util validate-relax --nonet pkgroot/usr/share/metainfo/*.metainfo.xml

      - name: Generate spec file
        shell: bash
        run: |
          mkdir -p rpmbuild/SPECS

          # rpm resolves dependencies by soname, so every bundled library would
          # otherwise be requested from the distribution - and offered to it. The
          # spec drops the provides by path; the requires have to be dropped by
          # name, so the pattern is generated from the staging tree and cannot
          # drift from what bundle.sh actually copied. A requires entry reads
          # 'libQt6Core.so.6()(64bit)', hence the trailing bracket.
          #
          # The literal '.' and '(' are written as bracket expressions rather than
          # escapes to keep the pattern free of backslashes, which sed would eat
          # from the replacement text below.
          sonames=''
          for lib in pkgroot/usr/lib/ouaexp/lib/*; do
            name="${lib##*/}"
            sonames="${sonames:+$sonames|}${name//./[.]}"
          done
          if [ -z "$sonames" ]; then
            echo "::error::No bundled libraries found; the staged tree is wrong"
            exit 1
          fi
          requires_exclude="^(${sonames})[(]"

          # What the bundle needs from the distribution is every soname its files
          # reference that it does not carry itself. This is what the dependency
          # generator is supposed to work out, and does not - see the spec - so it is
          # read out of the staged tree, which is the same thing dpkg-shlibdeps does
          # for the .deb. The package is x86_64 only, hence the fixed suffix.
          find pkgroot/usr/lib/ouaexp -type f \( -name '*.so*' -o -name ouaexp \) \
            -exec patchelf --print-needed {} + \
            | sort -u \
            | while read -r soname; do
                [ -e "pkgroot/usr/lib/ouaexp/lib/$soname" ] && continue
                echo "Requires:       ${soname}()(64bit)"
              done > rpmbuild/requires

          if [ ! -s rpmbuild/requires ]; then
            echo "::error::The bundle needs nothing from the distribution; that is wrong"
            exit 1
          fi
          cat rpmbuild/requires

          # '|' and '(' appear in the pattern, so '#' delimits the substitution. The
          # requires are a list, so they are read in from the file rather than
          # substituted into the line.
          sed -e "s#@NAME@#ouaexp#" \
              -e "s#@VERSION@#${{ steps.version.outputs.rpmVersion }}#" \
              -e "s#@RELEASE@#${{ steps.version.outputs.rpmRelease }}#" \
              -e "s#@REQUIRES_EXCLUDE@#${requires_exclude}#" \
              -e "/@REQUIRES@/r rpmbuild/requires" \
              -e "/@REQUIRES@/d" \
              .github/linux/rpm/ouaexp.spec.in > rpmbuild/SPECS/ouaexp.spec

          cat >> rpmbuild/SPECS/ouaexp.spec <<EOF
          * $(date -u +'%a %b %d %Y') ${{ env.MAINTAINER }} - ${{ steps.version.outputs.rpmVersion }}-${{ steps.version.outputs.rpmRelease }}
          - Automated build of ${{ github.sha }}.
          EOF

          cat rpmbuild/SPECS/ouaexp.spec

      - name: Build package
        run: |
          rpmbuild -bb rpmbuild/SPECS/ouaexp.spec \
            --define "_topdir $PWD/rpmbuild" \
            --define "_stagedir $PWD/pkgroot"

          mv "rpmbuild/RPMS/${{ steps.package.outputs.arch }}/${{ steps.package.outputs.name }}" .

      - name: Inspect package
        run: |
          rpm -qpi "${{ steps.package.outputs.name }}"
          rpm -qpl "${{ steps.package.outputs.name }}"
          echo '--- provides ---'
          rpm -qp --provides "${{ steps.package.outputs.name }}"
          echo '--- requires ---'
          rpm -qp --requires "${{ steps.package.outputs.name }}"

          # A leaked provide or require of a bundled soname means the exclusions
          # in the spec no longer match what bundle.sh copied: the package would
          # then pull a distribution Qt in, or hand its private one out.
          if rpm -qp --provides "${{ steps.package.outputs.name }}" | grep -E '^lib(Qt6|open62541|ssl|crypto)'; then
            echo "::error::The bundled libraries are offered as provides"
            exit 1
          fi
          if rpm -qp --requires "${{ steps.package.outputs.name }}" | grep -E '^lib(Qt6|open62541|ssl|crypto)'; then
            echo "::error::The bundled libraries are requested as requires"
            exit 1
          fi

      - name: Compute checksum
        run: sha256sum "${{ steps.package.outputs.name }}" > "${{ steps.package.outputs.name }}.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ouaexp-rpm-${{ steps.package.outputs.arch }}
          path: |
            ${{ steps.package.outputs.name }}
            ${{ steps.package.outputs.name }}.sha256
          if-no-files-found: error

  # The package is verified in a job of its own because the container the build runs
  # in has no Docker: the daemon lives on the runner, and a bind mount from inside
  # the container would name paths the daemon cannot see. The runner itself has both.
  verify:
    name: Verify .rpm
    runs-on: ubuntu-latest
    needs: rpm
    timeout-minutes: 30

    steps:
      # The verifying action is in the repository, so it has to be checked out even
      # though nothing is built here.
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: ouaexp-rpm-${{ needs.rpm.outputs.arch }}

      # Installing the .rpm on a real RPM distribution resolves the generated
      # Requires against its archive, so a missing runtime dependency fails here
      # rather than on a user's machine. The program is a GUI application with no
      # batch mode, so it is checked by resolving its libraries instead of
      # starting it. The images are the RPM distributions build.sh is tested on in
      # test-build-linux.yaml.
      - name: Verify the package installs
        uses: ./.github/actions/verify-linux-package
        with:
          package: ${{ needs.rpm.outputs.name }}
          package-manager: rpm
          images: >-
            fedora:43
            fedora:44
            rockylinux/rockylinux:10.1
            registry.red-soft.ru/redos8c/ubi:latest
            opensuse/tumbleweed
            alt:p11

      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ needs.rpm.outputs.prerelease != '' }}
          files: |
            ${{ needs.rpm.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
