name: Test CI

on:
  push:
    branches: [dev]
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/test-ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/test-ci.yml'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Qt ${{ matrix.qt }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt: '6.9.3'

          - os: windows-latest
            qt: '6.9.3'

          - os: macos-26
            qt: '6.9.3'
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES=arm64'
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus \
            gnome-keyring \
            ninja-build \
            libsecret-1-dev \
            libsecret-tools \
            libssl-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            python3-dbus \
            python3-gi

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          modules: qtcharts
          cache: true

      # On Linux CMake finds the distribution's libssl-dev installed above.
      - name: Set up OpenSSL
        if: runner.os != 'Linux'
        uses: ./.github/actions/setup-openssl

      - name: Install test dependencies
        run: python -m pip install -r tools/requirements.txt

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build/_deps/qtopcua-install
          key: qtopcua-${{ matrix.os }}-${{ matrix.qt }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      - name: Configure
        run: >
          cmake -S src -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          -DOUAEXP_BUILD_TESTS=ON
          ${{ matrix.cmake_extra }}

      - name: Build and run tests (Linux)
        if: runner.os == 'Linux'
        run: >
          dbus-run-session -- bash tools/with_session_services.sh
          cmake --build build --config Release --parallel --target ouaexp ouaexp_check

      - name: Build and run tests
        if: runner.os != 'Linux'
        run: cmake --build build --config Release --parallel --target ouaexp ouaexp_check

  coverage:
    name: Coverage (${{ matrix.os }}, Qt ${{ matrix.qt }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            qt: '6.9.3'

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus \
            gnome-keyring \
            ninja-build \
            libsecret-1-dev \
            libsecret-tools \
            libssl-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            python3-dbus \
            python3-gi

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          modules: qtcharts
          cache: true

      - name: Install test dependencies
        run: python -m pip install -r tools/requirements.txt

      - name: Cache Qt OpcUa build
        uses: actions/cache@v5
        with:
          path: build-coverage/_deps/qtopcua-install
          key: qtopcua-coverage-${{ matrix.os }}-${{ matrix.qt }}-${{ hashFiles('src/cmake/qtopcua.cmake') }}

      - name: Run coverage
        run: >
          dbus-run-session -- bash tools/with_session_services.sh
          python tools/coverage.py --strict -- -G Ninja

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: build-coverage/coverage
